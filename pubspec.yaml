name: lullaby
description: "FLOSS baby tracker for exhausted parents."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  drift: ^2.25.0
  sqlite3_flutter_libs: ^0.5.0
  go_router: ^15.1.0
  dynamic_color: ^1.7.0
  intl: ^0.20.2
  path_provider: ^2.1.5
  path: ^1.9.1
  uuid: ^4.5.1
  equatable: ^2.0.7
  image_picker: ^1.1.2
  collection: ^1.19.1
  fl_chart: ^0.70.2
  table_calendar: ^3.1.3
  pdf: ^3.11.0
  share_plus: ^10.0.0
  home_widget: ^0.7.0
  file_picker: ^8.0.0
  openhearth_design:
    path: ../ohStyle/openhearth_design
  sanctuary_auth_core:
    path: ../packages/sanctuary_auth_core
  sanctuary_backup_ui:
    path: ../packages/sanctuary_backup_ui

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  drift_dev: ^2.25.0
  sqlite3: ^2.9.4
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3
  oh_fleet_conformance:
    path: ../packages/oh_fleet_conformance

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#6750A4"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"

flutter:
  uses-material-design: true

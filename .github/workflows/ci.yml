# Release workflow intentionally omitted — applicationId is still com.example.lullaby.
# Add release.yml once applicationId is updated to a published identifier.

name: CI

on:
  push:
    branches: [master]
    tags: ['v*.*.*']
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          path: Lullaby

      - name: Clone the sibling path-dep packages
        # Lullaby depends on these by sibling path (../packages/... and
        # ../ohStyle/... relative to the Lullaby checkout above), matching the
        # local monorepo layout. They are published as their own public repos;
        # clone them where pubspec.yaml expects. sanctuary_backup_ui itself
        # depends on sanctuary_auth_core by the same sibling path, so both must
        # sit under packages/.
        run: |
          git clone --depth 1 https://github.com/levitatingflyfisher/sanctuaryAuthCore packages/sanctuary_auth_core
          git clone --depth 1 https://github.com/levitatingflyfisher/sanctuaryBackupUi packages/sanctuary_backup_ui
          git clone --depth 1 https://github.com/levitatingflyfisher/ohStyle ohStyle
          git clone --depth 1 https://github.com/levitatingflyfisher/ohFleetConformance packages/oh_fleet_conformance

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          # Must bundle Dart >= 3.10.7 to satisfy pubspec's `environment: sdk`.
          # 3.29.x shipped Dart 3.7.2 and failed version resolution.
          flutter-version: '3.38.7'
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: Lullaby
        run: flutter pub get

      - name: Generate code (build_runner / drift)
        working-directory: Lullaby
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        working-directory: Lullaby
        run: flutter analyze

      # C3: the gz-JS size budget only bites when build/web exists
      - name: Build web (C3 budget artifact)
        run: flutter build web --release
      - name: Run tests
        working-directory: Lullaby
        run: flutter test
